name: Auto Releaser By MicroResearch Corporation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1,4' # Twice a week

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  auto-release:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------
      # 1. Checkout repository (default main branch)
      # -------------------------------------------------
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # 2. Get latest release info (for changelog purposes)
      # -------------------------------------------------
      - name: Get latest Release
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const r = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.setOutput('tag', r.data.tag_name);
              core.setOutput('published_at', r.data.published_at);
            } catch {
              core.setOutput('tag', '');
              core.setOutput('published_at', '');
            }

      # -------------------------------------------------
      # 3. Checkout or Create the "release" branch
      # -------------------------------------------------
      - name: Checkout "release" branch
        run: |
          git fetch origin release || true
          if [ $(git branch --list release) ]; then
            git checkout release
          else
            git checkout -b release
          fi

      # -------------------------------------------------
      # 4. Prepare files for ZIP
      # -------------------------------------------------
      - name: Prepare release package
        run: |
          rm -rf release
          mkdir release
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='.gitignore' \
            ./ release/

      # -------------------------------------------------
      # 5. Create the ZIP file
      # -------------------------------------------------
      - name: Create ZIP in "release" branch
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          ZIP="release_${DATE}.zip"
          rm -f release/*.zip || true # Remove old zips if exist
          cd release && zip -qr "../$ZIP" .

          # Move ZIP to "release" folder
          mv "../$ZIP" .
          echo "ZIP=$ZIP" >> $GITHUB_ENV

      # -------------------------------------------------
      # 6. Commit ZIP to "release" branch
      # -------------------------------------------------
      - name: Commit ZIP to release branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Update release package with ${{ env.ZIP }}"
          git push origin release --force

      # -------------------------------------------------
      # 7. Build full release notes
      # -------------------------------------------------
      - name: Build release notes
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          REPO_URL="https://github.com/${{ github.repository }}"

          if [ -n "${{ steps.latest.outputs.tag }}" ]; then
            CHANGELOG_URL="$REPO_URL/compare/${{ steps.latest.outputs.tag }}...release"
          else
            CHANGELOG_URL="$REPO_URL/commits/main"
          fi

          cat <<EOF > notes.txt
          Release: ${DATE}

          Author: Pro Bandey
          Released By: MR Intelligence via GitHub Action
          Changelog: $CHANGELOG_URL
          EOF

          echo "NOTES<<EOF" >> $GITHUB_ENV
          cat notes.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # -------------------------------------------------
      # 8. Fetch the ZIP from Release Branch for GitHub Release
      # -------------------------------------------------
      - name: Fetch the ZIP from release branch
        run: |
          ls -l release/
          echo "Using ZIP: ${{ env.ZIP }}"

      # -------------------------------------------------
      # 9. Create GitHub Release
      # -------------------------------------------------
      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: r${{ github.run_number }}
          name: Release r${{ github.run_number }}
          body: ${{ env.NOTES }}
          files: release/${{ env.ZIP }}
          draft: false
          prerelease: false
